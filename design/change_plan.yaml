meta:
  created_date: "2026-05-14"
  basis:
    - test/spec_review_report.yaml  # レビュー結果
    - design/verify_diff_spec.json  # 詳細化済み仕様

# ============================================================
# 変更一覧
# ============================================================
changes:
  - id: CHG-1
    title: "verify_diff.py: CLI引数化（RQ-10対応）"
    priority: 1
    status: planned
    target_file: scripts/verify_diff.py
    basis: "RQ-10 / ISSUE-V-1 / ISSUE-V-2 をまとめて対応"
    spec_ref: "design/verify_diff_spec.json > cli"

    what:
      - "モジュール先頭のグローバル変数 (BASE/OLD/NEW/XLSX/REPORT_OUT/PROJECT/VARIANT) を削除"
      - "argparse に --project / --variant / --old / --new / --xlsx / --report-out / --plan を追加"
      - "--report-out のデフォルト: スクリプトの2階層上/test/verify_report_{variant}.yaml"
      - "--plan のデフォルト: スクリプトの2階層上/test/review_plan_{variant}.yaml"
      - "グローバル変数参照を全関数の引数受け渡しに変更"
      - "docstring を汎用ツール説明に更新（ISSUE-V-1）"
      - "REPORT_OUT / plan_path のファイル名を {variant} 動的生成に変更（ISSUE-V-2）"

    interface_after:
      command: "python3 scripts/verify_diff.py"
      required_args:
        - "--project ver1"
        - "--variant m02"
        - "--old <旧解析結果ディレクトリ>"
        - "--new <新解析結果ディレクトリ>"
        - "--xlsx <Excelファイルパス>"
      optional_args:
        - "--report-out <YAMLパス>  # デフォルト: test/verify_report_{variant}.yaml"
        - "--plan <YAMLパス>        # デフォルト: test/review_plan_{variant}.yaml"
      exit_codes:
        0: "全QG PASS"
        1: "いずれかのQG FAIL"

    affected_functions:
      - load_excel_entries    # XLSX, PROJECT, VARIANT をパラメータ化
      - files_differ          # OLD/NEW を除去（引数に変更）
      - phase1_file_inventory # OLD/NEW をパラメータ化
      - phase2_csv_diffs      # OLD/NEW をパラメータ化
      - phase3_image_diffs    # OLD/NEW をパラメータ化
      - phase4_entry_accuracy # OLD/NEW をパラメータ化
      - phase5_meta_consistency # PROJECT, VARIANT, LINK_TEXT をパラメータ化
      - main                  # argparse 追加・各フェーズへの引数渡し

    backward_compatibility:
      note: "引数が必須になるため既存の無引数呼び出しは動作しなくなる"
      mitigation: "ver1/m02 は既に verify_report_m02.yaml で証跡あり。呼び出し方を README等で案内"

  - id: CHG-2
    title: "verify_diff.py: files_differ() のOS依存解消（ISSUE-V-3）"
    priority: 2
    status: planned
    target_file: scripts/verify_diff.py
    basis: "ISSUE-V-3"

    what:
      - "subprocess.run(['diff', ...]) を廃止"
      - "path_old.read_bytes() != path_new.read_bytes() に置き換え"
      - "import subprocess を削除"

    before:
      code: |
        result = subprocess.run(["diff", "-q", str(path_old), str(path_new)], capture_output=True)
        return result.returncode != 0
    after:
      code: |
        return path_old.read_bytes() != path_new.read_bytes()

    note: "CHG-1 と同一コミットで対応"

  - id: CHG-3
    title: "verify_diff.py: 不要な import os の削除（ISSUE-V-4）"
    priority: 3
    status: planned
    target_file: scripts/verify_diff.py
    basis: "ISSUE-V-4"

    what:
      - "L8 の 'import os' を削除"

    note: "CHG-1/CHG-2 と同一コミットで対応"

# ============================================================
# 実装順序
# ============================================================
implementation_order:
  step_1:
    changes: [CHG-1, CHG-2, CHG-3]
    description: "verify_diff.py の修正（1コミットで一括対応）"
    verification: |
      python3 scripts/verify_diff.py \
        --project ver1 --variant m02 \
        --old work/format-change/input/scheduling_requirement_check_analysis_result \
        --new work/format-change/input/ver1_m02_AP_再解析結果/output \
        --xlsx "work/format-change/input/過去プロジェクト..." \
        で全QG PASS を確認

# ============================================================
# 影響なし（変更不要）
# ============================================================
no_change:
  - target: "scripts/extract_and_write_diff.py"
    reason: "全RQ PASS。変更不要"
  - target: "design/extract_and_write_diff_spec.json"
    reason: "変更なし"
  - target: "test/review_plan_m02.yaml / test/verify_report_m02.yaml"
    reason: "ver1/m02 の証跡ファイル。CHG-1 後は {variant} 動的命名で新規生成されるため現状維持"
