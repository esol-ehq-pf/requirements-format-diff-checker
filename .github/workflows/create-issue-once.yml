name: Create Issue (one-shot)

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Issue タイトル"
        required: true
        default: "feat: --csv-out オプションで差分情報を CSV ファイルに出力する"
      label:
        description: "ラベル（カンマ区切り）"
        required: true
        default: "enhancement"

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Issue を作成
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.inputs.title;
            const labels = context.payload.inputs.label.split(',').map(s => s.trim());

            const body = `## 概要

\`extract_and_write_diff.py\` に新しいオプションを追加し、差分情報を Excel シートに書き込む代わりに CSV ファイルとして出力できるようにする。

## 要求仕様

- オプション（例: \`--csv-out\`）を指定することで、差分情報を直接 Excel シートに書き込まず、CSV ファイルに出力する
- ファイル名が指定されている場合（例: \`--csv-out result.csv\`）は、指定のファイルに CSV 出力する
- ファイル名が指定されていない場合（例: \`--csv-out\` のみ）は、デフォルトのファイル名（例: \`diff_output.csv\`）に出力する

## 期待する動作

| 呼び出し方 | 動作 |
|-----------|------|
| オプションなし（現状） | Excel シートに書き込む（既存動作を維持） |
| \`--csv-out result.csv\` | \`result.csv\` に CSV 出力（Excel 書き込みなし） |
| \`--csv-out\`（ファイル名省略） | デフォルトファイルに CSV 出力（Excel 書き込みなし） |

## 備考

- CSV の列構成は Excel Output差分シートの列（No, フォルダ, ファイル, 差分概要, 旧値, 新値, リンク, project, variant, 推定原因）に対応させる
- \`--dry-run\` との併用可否についても設計時に検討する`;

            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: labels,
            });

            core.info(`Created issue #${result.data.number}: ${result.data.html_url}`);
            core.setOutput('issue_number', result.data.number);
            core.setOutput('issue_url', result.data.html_url);
